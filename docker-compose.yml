version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: stockalert-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stockalertapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-stockalertapp}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/postgres_schema.sql:/docker-entrypoint-initdb.d/postgres_schema.sql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-stockalertapp} -d ${POSTGRES_DB:-stockalertapp}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stockalert-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  alert_service:
    build:
      context: .
      dockerfile: apps/grpc/alert_service/Dockerfile
    container_name: stockalert-alert-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-stockalertapp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-stockalertapp}
      - FMP_API_KEY=${FMP_API_KEY:-}
      - DISCORD_WEBHOOK_DAILY=${DISCORD_WEBHOOK_DAILY:-}
      - DISCORD_WEBHOOK_WEEKLY=${DISCORD_WEBHOOK_WEEKLY:-}
      - DISCORD_WEBHOOK_HOURLY=${DISCORD_WEBHOOK_HOURLY:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=:50051"]
      interval: 10s
      timeout: 5s
      retries: 5

  price_service:
    build:
      context: .
      dockerfile: apps/grpc/price_service/Dockerfile
    container_name: stockalert-price-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-stockalertapp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-stockalertapp}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=:50051"]
      interval: 10s
      timeout: 5s
      retries: 5

  discord_service:
    build:
      context: .
      dockerfile: apps/grpc/discord_service/Dockerfile
    container_name: stockalert-discord-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-stockalertapp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-stockalertapp}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=:50051"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Scheduler: cron that enqueues "enqueue" task every 15 min to Redis (no DB needed)
  scheduler:
    build:
      context: .
      dockerfile: apps/scheduler/Dockerfile
    container_name: stockalert-scheduler
    restart: unless-stopped
    entrypoint: ["/scheduler"]
    env_file:
      - .env
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      redis:
        condition: service_healthy

  # Worker that only processes enqueue tasks (enqueues daily/weekly/hourly for due exchanges)
  worker_enqueue:
    build:
      context: .
      dockerfile: apps/scheduler/Dockerfile
    container_name: stockalert-worker-enqueue
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-stockalertapp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-stockalertapp}
      - REDIS_ADDR=redis:6379
      - WORKER_TASK_TYPES=enqueue
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Worker that only processes daily jobs
  worker_daily:
    build:
      context: .
      dockerfile: apps/scheduler/Dockerfile
    container_name: stockalert-worker-daily
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-stockalertapp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-stockalertapp}
      - REDIS_ADDR=redis:6379
      - WORKER_TASK_TYPES=daily
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Worker that only processes weekly jobs
  worker_weekly:
    build:
      context: .
      dockerfile: apps/scheduler/Dockerfile
    container_name: stockalert-worker-weekly
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-stockalertapp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-stockalertapp}
      - REDIS_ADDR=redis:6379
      - WORKER_TASK_TYPES=weekly
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Worker that only processes hourly jobs
  worker_hourly:
    build:
      context: .
      dockerfile: apps/scheduler/Dockerfile
    container_name: stockalert-worker-hourly
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-stockalertapp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-stockalertapp}
      - REDIS_ADDR=redis:6379
      - WORKER_TASK_TYPES=hourly
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler_service:
    build:
      context: .
      dockerfile: apps/grpc/scheduler_service/Dockerfile
    container_name: stockalert-scheduler-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-stockalertapp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-stockalertapp}
      - REDIS_ADDR=redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=:50051"]
      interval: 10s
      timeout: 5s
      retries: 5

  envoy:
    image: envoyproxy/envoy:v1.31-latest
    container_name: stockalert-envoy
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml
    depends_on:
      alert_service:
        condition: service_healthy
      discord_service:
        condition: service_healthy
      price_service:
        condition: service_healthy
      scheduler_service:
        condition: service_healthy

  autoheal:
    image: willfarrell/autoheal:latest
    container_name: stockalert-autoheal
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Check unhealthy containers every 30 seconds
      - AUTOHEAL_INTERVAL=30
      # Wait 5 minutes after container start before monitoring
      - AUTOHEAL_START_PERIOD=300
      # Default action is to restart unhealthy containers
      - AUTOHEAL_DEFAULT_STOP_TIMEOUT=10
    labels:
      # Prevent autoheal from monitoring itself
      - autoheal=false

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
