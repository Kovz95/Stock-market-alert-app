syntax = "proto3";

package stockalert.alert.v1;

option go_package = "stockalert/gen/go/alert/v1;alertv1";

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

// Alert represents a stock alert configuration.
message Alert {
  string alert_id = 1;
  string name = 2;
  string stock_name = 3;
  string ticker = 4;
  string ticker1 = 5;
  string ticker2 = 6;
  google.protobuf.Struct conditions = 7;
  string combination_logic = 8;
  google.protobuf.Timestamp last_triggered = 9;
  string action = 10;
  string timeframe = 11;
  string exchange = 12;
  string country = 13;
  string ratio = 14;
  bool is_ratio = 15;
  string adjustment_method = 16;
  google.protobuf.Struct dtp_params = 17;
  google.protobuf.Struct multi_timeframe_params = 18;
  google.protobuf.Struct mixed_timeframe_params = 19;
  google.protobuf.Struct raw_payload = 20;
  google.protobuf.Timestamp created_at = 21;
  google.protobuf.Timestamp updated_at = 22;
}

// ListAlerts (paginated)
message ListAlertsRequest {
  int32 page_size = 1;  // default 20, max 100
  int32 page = 2;       // 1-based page number
}

message ListAlertsResponse {
  repeated Alert alerts = 1;
  bool has_next_page = 2;
  int32 total_count = 3;
}

// GetAlert
message GetAlertRequest {
  string alert_id = 1;
}

message GetAlertResponse {
  Alert alert = 1;
}

// CreateAlert
message CreateAlertRequest {
  string name = 1;
  string stock_name = 2;
  string ticker = 3;
  string ticker1 = 4;
  string ticker2 = 5;
  google.protobuf.Struct conditions = 6;
  string combination_logic = 7;
  string action = 8;
  string timeframe = 9;
  string exchange = 10;
  string country = 11;
  string ratio = 12;
  bool is_ratio = 13;
  string adjustment_method = 14;
  google.protobuf.Struct dtp_params = 15;
  google.protobuf.Struct multi_timeframe_params = 16;
  google.protobuf.Struct mixed_timeframe_params = 17;
  google.protobuf.Struct raw_payload = 18;
}

message CreateAlertResponse {
  Alert alert = 1;
}

// UpdateAlert
message UpdateAlertRequest {
  string alert_id = 1;
  string name = 2;
  string stock_name = 3;
  string ticker = 4;
  string ticker1 = 5;
  string ticker2 = 6;
  google.protobuf.Struct conditions = 7;
  string combination_logic = 8;
  string action = 9;
  string timeframe = 10;
  string exchange = 11;
  string country = 12;
  string ratio = 13;
  bool is_ratio = 14;
  string adjustment_method = 15;
  google.protobuf.Struct dtp_params = 16;
  google.protobuf.Struct multi_timeframe_params = 17;
  google.protobuf.Struct mixed_timeframe_params = 18;
  google.protobuf.Struct raw_payload = 19;
}

message UpdateAlertResponse {
  Alert alert = 1;
}

// DeleteAlert
message DeleteAlertRequest {
  string alert_id = 1;
}

message DeleteAlertResponse {}

// BulkUpdateLastTriggered
message BulkUpdateLastTriggeredRequest {
  message AlertTrigger {
    string alert_id = 1;
    google.protobuf.Timestamp last_triggered = 2;
  }
  repeated AlertTrigger triggers = 1;
}

message BulkUpdateLastTriggeredResponse {
  int32 updated_count = 1;
}

// ---------------------------------------------------------------------------
// Alert Audit Logs (audit summary, metrics, history, failed price data)
// ---------------------------------------------------------------------------

message GetAuditSummaryRequest {
  int32 days = 1;  // default 7, how many days back
}

message AuditSummaryRow {
  string alert_id = 1;
  string ticker = 2;
  string stock_name = 3;
  string exchange = 4;
  string timeframe = 5;
  string action = 6;
  string evaluation_type = 7;
  int64 total_checks = 8;
  int64 successful_price_pulls = 9;
  int64 successful_evaluations = 10;
  int64 total_triggers = 11;
  double avg_execution_time_ms = 12;
  google.protobuf.Timestamp last_check = 13;
  google.protobuf.Timestamp first_check = 14;
}

message GetAuditSummaryResponse {
  repeated AuditSummaryRow rows = 1;
}

message GetPerformanceMetricsRequest {
  int32 days = 1;
}

message GetPerformanceMetricsResponse {
  int64 total_checks = 1;
  int64 successful_price_pulls = 2;
  double success_rate = 3;
  double cache_hit_rate = 4;
  double avg_execution_time_ms = 5;
  int64 total_errors = 6;
  double error_rate = 7;
  int32 analysis_period_days = 8;
}

message GetAlertHistoryRequest {
  string alert_id = 1;
  int32 limit = 2;  // default 100
}

message AuditHistoryRow {
  int64 id = 1;
  google.protobuf.Timestamp timestamp = 2;
  string alert_id = 3;
  string ticker = 4;
  string stock_name = 5;
  string exchange = 6;
  string timeframe = 7;
  string action = 8;
  string evaluation_type = 9;
  bool price_data_pulled = 10;
  string price_data_source = 11;
  bool conditions_evaluated = 12;
  bool alert_triggered = 13;
  string trigger_reason = 14;
  int32 execution_time_ms = 15;
  bool cache_hit = 16;
  string error_message = 17;
  string alert_name = 18;  // optional; populated by GetTriggerHistoryByTicker
}

message GetAlertHistoryResponse {
  repeated AuditHistoryRow rows = 1;
}

message GetFailedPriceDataRequest {
  int32 days = 1;
}

message FailedAlertRow {
  string alert_id = 1;
  string ticker = 2;
  string stock_name = 3;
  string exchange = 4;
  string timeframe = 5;
  string asset_type = 6;  // Stock, ETF, Unknown
  int64 failure_count = 7;
  google.protobuf.Timestamp last_failure = 8;
  google.protobuf.Timestamp first_failure = 9;
  double avg_execution_time = 10;
}

message AssetTypeBreakdownRow {
  string asset_type = 1;
  int64 failed_alerts = 2;
  int64 failure_count = 3;
}

message ExchangeBreakdownRow {
  string exchange = 1;
  int64 failed_alerts = 2;
  int64 failure_count = 3;
}

message GetFailedPriceDataResponse {
  repeated FailedAlertRow rows = 1;
  int64 total_failed_alerts = 2;
  int64 total_failures = 3;
  double failure_rate = 4;
  repeated AssetTypeBreakdownRow asset_type_breakdown = 5;
  repeated ExchangeBreakdownRow exchange_breakdown = 6;
}

message ClearAuditDataRequest {}

message ClearAuditDataResponse {
  int64 deleted_count = 1;
}

// ---------------------------------------------------------------------------
// Alert History Lookup (trigger history by ticker, stock search, portfolios)
// ---------------------------------------------------------------------------

message GetTriggerHistoryByTickerRequest {
  string ticker = 1;
  bool include_all_evaluations = 2;  // if false, only rows where alert_triggered = true
  int32 limit = 3;                   // default 50, max 500
  int32 days_back = 4;               // optional; filter to last N days (0 = no filter)
}

message GetTriggerHistoryByTickerResponse {
  repeated AuditHistoryRow rows = 1;
}

message SearchStocksRequest {
  string query = 1;
  int32 limit = 2;  // default 20, max 50
}

message StockSearchResult {
  string ticker = 1;
  string name = 2;
  string exchange = 3;
  string type = 4;           // asset_type from stock_metadata
  string rbics_economy = 5;   // optional
}

message SearchStocksResponse {
  repeated StockSearchResult results = 1;
}

message ListPortfoliosRequest {}

message Portfolio {
  string portfolio_id = 1;
  string name = 2;
  repeated string tickers = 3;
  string discord_webhook = 4;
  bool enabled = 5;
  string created_date = 6;
  string last_updated = 7;
}

message ListPortfoliosResponse {
  repeated Portfolio portfolios = 1;
}

// GetPortfolio
message GetPortfolioRequest {
  string portfolio_id = 1;
}

message GetPortfolioResponse {
  Portfolio portfolio = 1;
}

// CreatePortfolio
message CreatePortfolioRequest {
  string name = 1;
  string discord_webhook = 2;
}

message CreatePortfolioResponse {
  Portfolio portfolio = 1;
}

// UpdatePortfolio
message UpdatePortfolioRequest {
  string portfolio_id = 1;
  string name = 2;
  string discord_webhook = 3;
  bool enabled = 4;
}

message UpdatePortfolioResponse {
  Portfolio portfolio = 1;
}

// DeletePortfolio
message DeletePortfolioRequest {
  string portfolio_id = 1;
}

message DeletePortfolioResponse {}

// AddStocksToPortfolio
message AddStocksToPortfolioRequest {
  string portfolio_id = 1;
  repeated string tickers = 2;
}

message AddStocksToPortfolioResponse {
  Portfolio portfolio = 1;
}

// RemoveStocksFromPortfolio
message RemoveStocksFromPortfolioRequest {
  string portfolio_id = 1;
  repeated string tickers = 2;
}

message RemoveStocksFromPortfolioResponse {
  Portfolio portfolio = 1;
}

// ---------------------------------------------------------------------------
// EvaluateExchange — synchronous alert evaluation with price update + Discord
// ---------------------------------------------------------------------------

message EvaluateExchangeRequest {
  // Exchange symbol, e.g. "NASDAQ", "NYSE", "LSE"
  string exchange = 1;
  // "daily", "weekly", or "hourly" — defaults to "daily" if empty
  string timeframe = 2;
}

message EvaluateExchangeResponse {
  bool success = 1;
  string message = 2;
  int32 alerts_total = 3;
  int32 alerts_triggered = 4;
  int32 prices_updated = 5;
  double duration_seconds = 6;
}

// AlertService provides CRUD operations for stock alerts and audit logs.
service AlertService {
  rpc ListAlerts(ListAlertsRequest) returns (ListAlertsResponse);
  rpc GetAlert(GetAlertRequest) returns (GetAlertResponse);
  rpc CreateAlert(CreateAlertRequest) returns (CreateAlertResponse);
  rpc UpdateAlert(UpdateAlertRequest) returns (UpdateAlertResponse);
  rpc DeleteAlert(DeleteAlertRequest) returns (DeleteAlertResponse);
  rpc BulkUpdateLastTriggered(BulkUpdateLastTriggeredRequest) returns (BulkUpdateLastTriggeredResponse);

  // Audit logs
  rpc GetAuditSummary(GetAuditSummaryRequest) returns (GetAuditSummaryResponse);
  rpc GetPerformanceMetrics(GetPerformanceMetricsRequest) returns (GetPerformanceMetricsResponse);
  rpc GetAlertHistory(GetAlertHistoryRequest) returns (GetAlertHistoryResponse);
  rpc GetFailedPriceData(GetFailedPriceDataRequest) returns (GetFailedPriceDataResponse);
  rpc ClearAuditData(ClearAuditDataRequest) returns (ClearAuditDataResponse);

  // Alert History Lookup
  rpc GetTriggerHistoryByTicker(GetTriggerHistoryByTickerRequest) returns (GetTriggerHistoryByTickerResponse);
  rpc SearchStocks(SearchStocksRequest) returns (SearchStocksResponse);
  rpc ListPortfolios(ListPortfoliosRequest) returns (ListPortfoliosResponse);

  // Portfolio CRUD
  rpc GetPortfolio(GetPortfolioRequest) returns (GetPortfolioResponse);
  rpc CreatePortfolio(CreatePortfolioRequest) returns (CreatePortfolioResponse);
  rpc UpdatePortfolio(UpdatePortfolioRequest) returns (UpdatePortfolioResponse);
  rpc DeletePortfolio(DeletePortfolioRequest) returns (DeletePortfolioResponse);
  rpc AddStocksToPortfolio(AddStocksToPortfolioRequest) returns (AddStocksToPortfolioResponse);
  rpc RemoveStocksFromPortfolio(RemoveStocksFromPortfolioRequest) returns (RemoveStocksFromPortfolioResponse);

  // Synchronous evaluation: update prices, evaluate alerts, send Discord notifications
  rpc EvaluateExchange(EvaluateExchangeRequest) returns (EvaluateExchangeResponse);
}
