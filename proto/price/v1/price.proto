syntax = "proto3";

package stockalert.price.v1;

option go_package = "stockalert/gen/go/price/v1;pricev1";

import "google/protobuf/timestamp.proto";

// StockMetadata is a single row from stock_metadata for filters and display.
message StockMetadata {
  string symbol = 1;
  string name = 2;
  string exchange = 3;
  string isin = 4;
}

// GetStockMetadataMap returns all stock metadata for the price DB UI (filters, ticker list).
message GetStockMetadataMapRequest {}

message GetStockMetadataMapResponse {
  repeated StockMetadata items = 1;
}

// FullStockMetadata is a full row from stock_metadata plus flattened ETF fields from raw_payload (for Stock Database UI).
message FullStockMetadata {
  string symbol = 1;
  string name = 2;
  string exchange = 3;
  string country = 4;
  string isin = 5;
  string asset_type = 6;
  string rbics_economy = 7;
  string rbics_sector = 8;
  string rbics_subsector = 9;
  string rbics_industry_group = 10;
  string rbics_industry = 11;
  string rbics_subindustry = 12;
  optional double closing_price = 13;
  optional double market_value = 14;
  optional double sales = 15;
  optional double avg_daily_volume = 16;
  string data_source = 17;
  google.protobuf.Timestamp last_updated = 18;
  // ETF fields (from raw_payload when present).
  string etf_issuer = 19;
  string etf_asset_class = 20;
  string etf_focus = 21;
  string etf_niche = 22;
  optional double expense_ratio = 23;
  optional double aum = 24;
}

message GetFullStockMetadataRequest {}

message GetFullStockMetadataResponse {
  repeated FullStockMetadata items = 1;
}

// DatabaseStats holds record counts, ticker counts, and date ranges per timeframe.
message DatabaseStats {
  int64 hourly_records = 1;
  int64 daily_records = 2;
  int64 weekly_records = 3;
  int32 hourly_tickers = 4;
  int32 daily_tickers = 5;
  int32 weekly_tickers = 6;
  google.protobuf.Timestamp hourly_min = 7;
  google.protobuf.Timestamp hourly_max = 8;
  google.protobuf.Timestamp daily_min = 9;
  google.protobuf.Timestamp daily_max = 10;
  google.protobuf.Timestamp weekly_min = 11;
  google.protobuf.Timestamp weekly_max = 12;
}

message GetDatabaseStatsRequest {}

message GetDatabaseStatsResponse {
  DatabaseStats stats = 1;
}

// Timeframe for price data.
enum Timeframe {
  TIMEFRAME_UNSPECIFIED = 0;
  TIMEFRAME_HOURLY = 1;
  TIMEFRAME_DAILY = 2;
  TIMEFRAME_WEEKLY = 3;
}

// DayFilter for filtering by weekdays/weekends.
enum DayFilter {
  DAY_FILTER_UNSPECIFIED = 0;
  DAY_FILTER_ALL = 1;
  DAY_FILTER_WEEKDAYS = 2;
  DAY_FILTER_WEEKENDS = 3;
}

// PriceRow is a single OHLCV bar (daily, hourly, or weekly).
message PriceRow {
  string ticker = 1;
  google.protobuf.Timestamp time = 2;  // date for daily, week_ending for weekly, datetime for hourly
  double open = 3;
  double high = 4;
  double low = 5;
  double close = 6;
  int64 volume = 7;
}

message LoadPriceDataRequest {
  Timeframe timeframe = 1;
  repeated string tickers = 2;  // empty = all tickers
  google.protobuf.Timestamp start_date = 3;
  google.protobuf.Timestamp end_date = 4;
  int32 max_rows = 5;  // required, e.g. 5000
  DayFilter day_filter = 6;
}

message LoadPriceDataResponse {
  repeated PriceRow rows = 1;
}

// --- Stale scan (read-only) ---

// StaleTickerRow represents one ticker that is behind expected (daily or weekly).
message StaleTickerRow {
  string ticker = 1;
  google.protobuf.Timestamp last_update = 2;  // last date or week_ending
  int32 days_old = 3;
  string company_name = 4;
  string exchange = 5;
}

// ScanStaleDaily: tickers where last daily bar < expected trading day.
message ScanStaleDailyRequest {
  int32 limit = 1;  // max rows to return, 0 = no limit
}

message ScanStaleDailyResponse {
  repeated StaleTickerRow rows = 1;
}

// ScanStaleWeekly: tickers where last week_ending < expected Friday.
message ScanStaleWeeklyRequest {
  int32 limit = 1;
}

message ScanStaleWeeklyResponse {
  repeated StaleTickerRow rows = 1;
}

// StaleHourlyRow: one ticker behind on hourly data.
message StaleHourlyRow {
  string ticker = 1;
  google.protobuf.Timestamp last_hour = 2;
  double hours_behind = 3;
}

// ScanStaleHourly: tickers missing the most recent hourly bar.
message ScanStaleHourlyRequest {
  int32 limit = 1;
}

message ScanStaleHourlyResponse {
  repeated StaleHourlyRow rows = 1;
  google.protobuf.Timestamp latest_hour = 2;   // reference expected hour used
  int32 total_tickers = 3;
  int32 up_to_date_count = 4;
}

// GetHourlyDataQuality: freshness and gap metrics for hourly_prices.
message GetHourlyDataQualityRequest {}

message GetHourlyDataQualityResponse {
  int32 total_tickers = 1;
  int32 stale_tickers = 2;       // last_dt < now - 48h
  google.protobuf.Timestamp oldest_stale = 3;
  int32 gap_tickers = 4;         // tickers with trading gap > 72h in last 60d
  double worst_gap_hours = 5;    // max trading-hour gap
  double worst_calendar_gap_hours = 6;
}

// --- Scanner: run scan with conditions ---

// SymbolFilter filters the universe for RunScan when tickers is not set.
message SymbolFilter {
  repeated string asset_types = 1;   // e.g. "Stock", "ETF"
  repeated string countries = 2;
  repeated string exchanges = 3;
  repeated string rbics_economy = 4;
  repeated string rbics_sector = 5;
  repeated string rbics_subsector = 6;
  repeated string rbics_industry_group = 7;
  repeated string rbics_industry = 8;
  repeated string rbics_subindustry = 9;
}

// RunScanRequest runs a single-symbol scan. Either tickers or symbol_filter is used.
message RunScanRequest {
  Timeframe timeframe = 1;
  repeated string conditions = 2;
  string combination_logic = 3;     // e.g. "AND", "OR", "1 AND (2 OR 3)"
  repeated string tickers = 4;       // if non-empty, scan only these; else use symbol_filter
  SymbolFilter symbol_filter = 5;
  int32 max_tickers = 6;            // cap on symbols to scan (e.g. 20000), 0 = no limit
  int32 lookback_days = 7;          // 0 = today only, 1–100 = scan last X trading days
}

// ScanMatch is one symbol that matched the scan conditions.
message ScanMatch {
  string ticker = 1;
  string name = 2;
  string exchange = 3;
  string country = 4;
  string asset_type = 5;
  double price = 6;
  string rbics_economy = 7;
  string rbics_sector = 8;
  string rbics_subsector = 9;
  string rbics_industry_group = 10;
  string rbics_industry = 11;
  string rbics_subindustry = 12;
  string condition_values = 13;     // optional display string for condition values
  string match_date = 14;           // YYYY-MM-DD (or RFC3339 for hourly) when lookback_days > 0
}

message RunScanResponse {
  repeated ScanMatch matches = 1;
  string error_message = 2;        // set if scan failed
}

// --- On-demand price update (streaming progress) ---

// UpdatePricesRequest requests a price update for the given exchanges and optional tickers.
message UpdatePricesRequest {
  repeated string exchanges = 1;   // at least one required
  repeated string tickers = 2;     // optional; if empty, all tickers for the exchanges
  Timeframe timeframe = 3;         // HOURLY, DAILY, or WEEKLY
}

// UpdatePricesProgress is a single progress event (server-streaming).
message UpdatePricesProgress {
  string exchange = 1;
  int32 exchange_index = 2;        // 1-based index of current exchange
  int32 exchange_total = 3;
  int32 tickers_updated = 4;
  int32 tickers_failed = 5;
  bool done = 6;                  // true when stream is complete
  string error_message = 7;       // set if an error occurred
}

// PriceService provides read-only access to the price database and on-demand updates.
service PriceService {
  rpc GetStockMetadataMap(GetStockMetadataMapRequest) returns (GetStockMetadataMapResponse);
  rpc GetFullStockMetadata(GetFullStockMetadataRequest) returns (GetFullStockMetadataResponse);
  rpc GetDatabaseStats(GetDatabaseStatsRequest) returns (GetDatabaseStatsResponse);
  rpc LoadPriceData(LoadPriceDataRequest) returns (LoadPriceDataResponse);
  rpc ScanStaleDaily(ScanStaleDailyRequest) returns (ScanStaleDailyResponse);
  rpc ScanStaleWeekly(ScanStaleWeeklyRequest) returns (ScanStaleWeeklyResponse);
  rpc ScanStaleHourly(ScanStaleHourlyRequest) returns (ScanStaleHourlyResponse);
  rpc GetHourlyDataQuality(GetHourlyDataQualityRequest) returns (GetHourlyDataQualityResponse);
  rpc RunScan(RunScanRequest) returns (RunScanResponse);
  rpc UpdatePrices(UpdatePricesRequest) returns (stream UpdatePricesProgress);
}
